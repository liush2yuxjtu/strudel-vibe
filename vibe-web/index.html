<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>vibe-music · 用一句话写音乐</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>" />
<!-- Strudel engine vendored locally (same bytes as @strudel/web@1.2.6) so it loads
     without unpkg.com — which is unreliable/blocked in mainland China. -->
<script src="vendor/strudel-web-1.2.6.js"></script>
<style>
  :root{
    --bg:#0a0a0f; --panel:#12121c; --ink:#e8e6f0; --dim:#7a7790;
    --neon:#7af0c0; --neon2:#b07aff; --hot:#ff5d9e; --line:#23202f;
    --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 700px at 80% -10%, #1a1330 0%, transparent 55%),
               radial-gradient(900px 600px at -10% 110%, #0f2438 0%, transparent 50%), var(--bg);
    color:var(--ink); font-family:var(--mono); -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; min-height:100%;
  }
  header{padding:22px 26px 6px; display:flex; align-items:baseline; gap:14px; flex-wrap:wrap}
  .logo{font-size:26px; font-weight:800; letter-spacing:-.5px}
  .logo b{color:var(--neon)}
  .logo i{color:var(--neon2); font-style:normal}
  .tag{color:var(--dim); font-size:13px}
  .wrap{flex:1; display:grid; grid-template-columns:1fr 1fr; gap:18px; padding:14px 26px 26px; max-width:1180px; width:100%; margin:0 auto}
  @media(max-width:820px){ .wrap{grid-template-columns:1fr} }
  .panel{background:linear-gradient(180deg,var(--panel),#0e0e16); border:1px solid var(--line); border-radius:16px; padding:18px; display:flex; flex-direction:column; min-height:0}
  .panel h2{margin:0 0 12px; font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--dim); font-weight:700}
  /* visualizer */
  .viz{position:relative; height:120px; display:flex; align-items:flex-end; gap:4px; padding:8px 2px; border-radius:10px; background:#0b0b12; border:1px solid var(--line); overflow:hidden}
  .viz i{flex:1; background:linear-gradient(180deg,var(--neon),var(--neon2)); border-radius:3px 3px 0 0; height:8%; transition:height .09s ease}
  .viz.composing{border-color:var(--neon2); box-shadow:inset 0 0 24px rgba(176,122,255,.18)}
  .viz .vlabel{position:absolute; inset:0; display:none; align-items:center; justify-content:center; gap:10px;
    font-size:13px; letter-spacing:.04em; color:var(--neon); pointer-events:none; text-shadow:0 0 12px rgba(122,240,192,.5)}
  .viz.composing .vlabel,.viz.loading .vlabel{display:flex}
  .spin{width:15px; height:15px; border:2px solid rgba(176,122,255,.25); border-top-color:var(--neon2); border-radius:50%; animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* thin indeterminate progress bar shown while composing/loading */
  .prog{height:3px; border-radius:3px; margin-top:10px; background:#15131f; overflow:hidden; opacity:0; transition:opacity .2s}
  .prog.on{opacity:1}
  .prog i{display:block; height:100%; width:40%; border-radius:3px;
    background:linear-gradient(90deg,transparent,var(--neon),var(--neon2),transparent);
    animation:slide 1.1s ease-in-out infinite}
  @keyframes slide{0%{transform:translateX(-110%)}100%{transform:translateX(310%)}}
  .state{margin:12px 0; font-size:13px; color:var(--dim); min-height:18px}
  .state b{color:var(--neon)}
  .state .dots::after{content:''; animation:dots 1.1s steps(4,end) infinite}
  @keyframes dots{0%{content:''}25%{content:'·'}50%{content:'··'}75%{content:'···'}100%{content:''}}
  .code{flex:1; min-height:120px; width:100%; resize:none; background:#0b0b12; color:var(--neon);
    border:1px solid var(--line); border-radius:10px; padding:14px; font-family:var(--mono); font-size:14px; line-height:1.55; tab-size:2}
  .code:focus{outline:none; border-color:var(--neon2)}
  .row{display:flex; gap:10px; margin-top:12px; flex-wrap:wrap}
  button{font-family:var(--mono); font-size:14px; font-weight:700; border-radius:10px; border:1px solid var(--line);
    background:#171622; color:var(--ink); padding:11px 16px; cursor:pointer; transition:.15s}
  button:hover{border-color:var(--neon2); transform:translateY(-1px)}
  button.primary{background:var(--neon); color:#04120c; border-color:var(--neon)}
  button.hot{background:transparent; color:var(--hot); border-color:#3a2230}
  button[disabled]{opacity:.65; cursor:progress; transform:none}
  button.busy{position:relative; color:transparent !important}
  button.busy::after{content:''; position:absolute; inset:0; margin:auto; width:15px; height:15px;
    border:2px solid rgba(4,18,12,.35); border-top-color:#04120c; border-radius:50%; animation:spin .7s linear infinite}
  .promptbox{display:flex; gap:10px; margin-top:6px}
  .promptbox input{flex:1; background:#0b0b12; border:1px solid var(--line); border-radius:12px; color:var(--ink);
    font-family:var(--mono); font-size:16px; padding:15px 16px}
  .promptbox input:focus{outline:none; border-color:var(--neon)}
  .chips{display:flex; gap:8px; flex-wrap:wrap; margin-top:12px}
  .chip{font-size:12.5px; color:var(--dim); background:#0e0e17; border:1px solid var(--line); border-radius:999px; padding:7px 12px; cursor:pointer}
  .chip:hover{color:var(--neon); border-color:var(--neon)}
  .log{font-size:12.5px; color:var(--dim); margin-top:14px; max-height:150px; overflow:auto; line-height:1.7}
  .log .u{color:var(--neon2)} .log .c{color:var(--neon)}
  footer{padding:8px 26px 20px; color:var(--dim); font-size:12px; text-align:center}
  a{color:var(--neon)}
  .pill{display:inline-block; padding:2px 8px; border:1px solid var(--line); border-radius:999px; font-size:11px; color:var(--dim)}
</style>
</head>
<body>
  <header>
    <div class="logo"><b>vibe</b>-<i>music</i></div>
    <div class="tag">用一句中文或英文，让 MiniMax 写 Strudel，浏览器实时演奏 · <span class="pill">MiniMax-M2.7</span></div>
  </header>

  <div class="wrap">
    <section class="panel">
      <h2>① 说出你想要的声音</h2>
      <div class="promptbox">
        <input id="intent" autocomplete="off" placeholder="例如：四拍鼓加八分hihat / a dreamy minor bassline" />
        <button class="primary" id="send">vibe ⏎</button>
      </div>
      <div class="prog" id="prog"><i></i></div>
      <div class="chips" id="chips"></div>
      <div class="state" id="state">点击下方示例或直接输入，首次会请求麦克风/音频权限并加载鼓采样…</div>
      <div class="row">
        <button class="primary" id="play">▶ 播放</button>
        <button class="hot" id="stop">⏹ 停止</button>
        <button id="surprise">🎲 随便来一段</button>
      </div>
      <div class="log" id="log"></div>
    </section>

    <section class="panel">
      <h2>② 正在演奏的 Strudel 代码（可手动编辑）</h2>
      <div class="viz" id="viz"><div class="vlabel" id="vlabel"><span class="spin"></span><span id="vtext">正在作曲</span></div></div>
      <textarea class="code" id="code" spellcheck="false" placeholder="// 生成的 pattern 会出现在这里，可直接改了再按播放"></textarea>
      <div class="row">
        <button id="apply">应用编辑 ↵</button>
        <span class="state" style="margin:0;align-self:center">Strudel 在你的浏览器里发声（WebAudio）</span>
      </div>
    </section>
  </div>

  <footer>
    built with <a href="https://strudel.cc" target="_blank">Strudel</a> · NL→code by MiniMax ·
    terminal twin: <span class="pill">/vibe-music</span> &nbsp;|&nbsp; <span id="status2"></span>
  </footer>

<script>
  const $ = (id)=>document.getElementById(id);
  let started=false, playing=false, current='';
  // phase: 'idle' | 'loading' (engine/samples) | 'composing' (MiniMax) | 'playing'
  let phase='idle', phaseSince=performance.now();
  const EXAMPLES = [
    "四拍鼓加八分hihat","加一条小调贝斯线","鼓声小一点","更梦幻一点，加点混响",
    "drum and bass beat","a jazzy chord progression","techno with acid bass","空灵的氛围pad",
  ];
  const chips=$('chips');
  EXAMPLES.forEach(t=>{ const c=document.createElement('span'); c.className='chip'; c.textContent=t;
    c.onclick=()=>{ $('intent').value=t; vibe(); }; chips.appendChild(c); });

  // visualizer bars
  const viz=$('viz'); const BARS=48;
  for(let i=0;i<BARS;i++){ viz.appendChild(document.createElement('i')); }
  const bars=[...viz.querySelectorAll('i')];

  // One animation loop drives the equalizer for EVERY active phase — not just
  // playback. During composing/loading it shows a travelling sine "thinking"
  // wave so the 3–5s MiniMax wait is never a dead screen (eval point #5).
  let frame=0;
  setInterval(()=>{
    frame++;
    if(phase==='playing'){
      bars.forEach(b=>{ b.style.height=(8+Math.random()*92)+'%'; });
    } else if(phase==='composing' || phase==='loading'){
      bars.forEach((b,i)=>{
        const w = Math.sin((i/BARS)*Math.PI*3 + frame*0.5);
        const h = 14 + (w*0.5+0.5)*48 + Math.random()*8;   // lively but calm
        b.style.height=h+'%';
      });
    } else { // idle: slow breathing baseline (never frozen — story 4 edge case)
      bars.forEach((b,i)=>{ b.style.height=(6+Math.sin(i*0.4+frame*0.06)*3)+'%'; });
    }
  }, 90);

  // Elapsed-time ticker keeps the composing label visibly changing every ~250ms,
  // guaranteeing "any >1s with no UI change" never happens.
  setInterval(()=>{
    if(phase==='composing'){
      const s=((performance.now()-phaseSince)/1000).toFixed(1);
      $('vtext').textContent='正在作曲 '+s+'s';
    } else if(phase==='loading'){
      $('vtext').textContent='加载音频引擎';
    }
  }, 250);

  function setPhase(p){
    phase=p; phaseSince=performance.now();
    playing = (p==='playing');
    const busy = (p==='composing' || p==='loading');
    viz.classList.toggle('composing', p==='composing');
    viz.classList.toggle('loading', p==='loading');
    $('prog').classList.toggle('on', busy);
    const send=$('send');
    send.disabled=busy; send.classList.toggle('busy', busy);
    $('play').disabled=busy; $('surprise').disabled=busy;
  }

  function logLine(html){ const l=$('log'); l.innerHTML += html+'<br>'; l.scrollTop=l.scrollHeight; }
  function setState(html){ $('state').innerHTML=html; }

  // WebAudio starts 'suspended' until a user gesture; the submit/play tap IS that
  // gesture, so resume the context explicitly → AudioContext.state === 'running'
  // (eval point #4). getAudioContext is injected globally by initStrudel.
  async function resumeAudio(){
    try{
      const ac = (typeof getAudioContext==='function') ? getAudioContext() : null;
      if(ac && ac.state!=='running') await ac.resume();
      return ac ? ac.state : null;
    }catch{ return null; }
  }
  function audioState(){
    try{ return (typeof getAudioContext==='function') ? getAudioContext().state : 'none'; }
    catch{ return 'none'; }
  }

  let enginePromise=null;
  function ensureStarted(){
    if(started) return Promise.resolve();
    if(enginePromise) return enginePromise;
    // Drum/melodic samples are served from THIS app's own origin (/samples), not
    // GitHub raw — github.com / raw.githubusercontent.com are blocked in mainland China,
    // which otherwise leaves the kit silent. See samples/strudel.json (_base: /samples/).
    enginePromise = initStrudel({ prebake: () => samples('/samples/strudel.json') })
      .then(()=>{ started=true; });
    return enginePromise;
  }

  async function playCode(code){
    if(!started){ setPhase('loading'); }
    await ensureStarted();
    try{
      await evaluate(code, true);
      await resumeAudio();
      current=code; $('code').value=code;
      setPhase('playing');
      setState('<b>♪ 正在演奏</b> · 在右侧改代码再按「应用编辑」');
    }catch(e){
      setPhase('idle');
      setState('这段没法播放：'+e.message);
    }
  }

  async function vibe(){
    const intent=$('intent').value.trim();
    if(!intent) return;
    // ---- INSTANT feedback (<100ms, fully synchronous, before any await) ----
    setPhase('composing');
    setState('MiniMax 正在作曲<span class="dots"></span>（约 3–5 秒）');
    $('vtext').textContent='正在作曲';
    logLine('<span class="u">› '+intent+'</span>');
    // Load the audio engine IN PARALLEL with the MiniMax call so the first vibe
    // doesn't pay load-then-compose serially.
    ensureStarted();
    try{
      const r=await fetch('/api/vibe',{method:'POST',headers:{'content-type':'application/json'},
        body:JSON.stringify({intent, current})});
      const data=await r.json();
      if(!r.ok || data.error){
        setPhase('idle');
        setState('出错：'+(data.error||r.status)+(data.detail?(' — '+data.detail):''));
        return;
      }
      logLine('<span class="c">'+data.code.replace(/</g,'&lt;')+'</span>');
      await playCode(data.code);
      $('intent').value='';
    }catch(e){ setPhase('idle'); setState('请求失败：'+e.message); }
  }

  // Test/inspection hook for the third-party eval harness (eval #4/#5).
  window.__vibe = { phase:()=>phase, phaseSince:()=>phaseSince, audioState, started:()=>started, current:()=>current };

  $('send').onclick=vibe;
  $('intent').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); vibe(); }});
  $('play').onclick=()=>{ const c=$('code').value.trim()||current; if(c) playCode(c); };
  $('apply').onclick=()=>{ const c=$('code').value.trim(); if(c) playCode(c); };
  $('stop').onclick=()=>{ try{ hush(); }catch{} setPhase('idle'); setState('⏹ 已停止'); };
  $('surprise').onclick=()=>{ $('intent').value = EXAMPLES[Math.floor(Math.random()*EXAMPLES.length)]; vibe(); };

  // health check of api
  fetch('/api/vibe',{method:'POST',headers:{'content-type':'application/json'},body:'{}'})
    .then(r=>r.json()).then(d=>{ $('status2').textContent = d.error==='intent required' ? 'API ✓' : (d.error||'API'); })
    .catch(()=>{ $('status2').textContent='API offline'; });
</script>
</body>
</html>
